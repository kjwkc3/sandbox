name: Odin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint and Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Odin
        uses: laytan/setup-odin@v1
        with:
          release: latest

      - name: Vet and Build
        run: odin build . -vet -strict-style -vet-tabs -disallow-do -warnings-as-errors
